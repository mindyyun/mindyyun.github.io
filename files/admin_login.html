<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Visual Memory Study</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #1a1c18;
    --surface: #23261f;
    --border: #2e3228;
    --text: #e8e4de;
    --muted: #7a7a6e;
    --accent: #8fc642;
    --accent-dark: #6da832;
    --error: #e05c5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
  }

  .login-box {
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 40px;
  }

  .admin-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .sub {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 36px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  input:focus { border-color: var(--accent); }

  .error-msg {
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--error);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  button[type="submit"] {
    width: 100%;
    background: var(--accent);
    color: #1a1c18;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.02em;
  }

  button[type="submit"]:hover { background: var(--accent-dark); }
</style>
</head>
<body>
<div class="login-box">
  <div class="admin-badge">Admin Portal</div>
  <h1>Researcher<br>Access</h1>
  <p class="sub">Visual Memory & Food Imagery Study</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="off" required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">Sign In &rarr;</button>
  </form>
</div>
</body>
</html>
